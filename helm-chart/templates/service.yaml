apiVersion: v1
kind: Service
metadata:
  name: literature-app-{{ .Values.podLabels.color }}-service
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  selector:
    app: literature-app
    color: {{ .Values.podLabels.color }} 
