apiVersion: v1
kind: Service
metadata:
  name: literature-app-service
  namespace: jenkins
  annotations:
    # 1. Biar Helm gak hapus service ini pas uninstall warna lama
    "helm.sh/resource-policy": keep
    # 2. & 3. Trik biar Helm Blue bisa "ngerebut" hak asuh dari Green tanpa Error
    "meta.helm.sh/release-name": {{ .Release.Name | quote }}
    "meta.helm.sh/release-namespace": {{ .Release.Namespace | quote }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  selector:
    app: literature-app
    # KOSONGIN COLOR: Biar Jenkins yang nge-patch secara dinamis
