{{- if .Values.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: literature-app-service
  namespace: jenkins
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port | default 80 }}
      targetPort: {{ .Values.service.targetPort | default 3000 }}
      protocol: TCP
  selector:
    app: literature-app
    color: {{ .Values.podLabels.color | default "blue" }}
{{- end -}}
